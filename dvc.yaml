stages:
  extract:
    cmd: python src/data/extract_zips.py
    deps:
      - data/raw/zips
    outs:
      - data/interim/extracted_mat

  ingest:
    cmd: python src/data/ingestion/ingest.py
    deps:
      - src/data/ingestion
      - data/interim/extracted_mat
    outs:
      - data/ingested/index.csv
      - data/ingested/patient_map.json
      - data/ingested/label_stats.json
      - data/ingested/dataset_summary.json

  split:
    cmd: python src/data/split/cv_split.py
    deps:
      - src/data/split/cv_split.py
      - data/ingested/index.csv
      - data/splits/cvind.mat
    outs:
      - data/splits/fold_0_train.csv
      - data/splits/fold_0_val.csv
      - data/splits/fold_1_train.csv
      - data/splits/fold_1_val.csv
      - data/splits/fold_2_train.csv
      - data/splits/fold_2_val.csv
      - data/splits/fold_3_train.csv
      - data/splits/fold_3_val.csv
      - data/splits/fold_4_train.csv
      - data/splits/fold_4_val.csv
      - data/splits/split_report.json

  validate_split:
    cmd: python src/data/split/check_patient_leakage.py
    deps:
      - src/data/split/check_patient_leakage.py
      - data/splits/fold_0_train.csv
      - data/splits/fold_0_val.csv
      - data/splits/fold_1_train.csv
      - data/splits/fold_1_val.csv
      - data/splits/fold_2_train.csv
      - data/splits/fold_2_val.csv
      - data/splits/fold_3_train.csv
      - data/splits/fold_3_val.csv
      - data/splits/fold_4_train.csv
      - data/splits/fold_4_val.csv
    outs:
      - data/splits/leakage_report.json

  preprocess:
    cmd: python -m src.preprocessing.preprocess
    deps:
      - src/preprocessing
      - data/ingested/index.csv
      - data/splits/leakage_report.json
      - data/splits/fold_0_train.csv
      - data/splits/fold_0_val.csv
      - data/splits/fold_1_train.csv
      - data/splits/fold_1_val.csv
      - data/splits/fold_2_train.csv
      - data/splits/fold_2_val.csv
      - data/splits/fold_3_train.csv
      - data/splits/fold_3_val.csv
      - data/splits/fold_4_train.csv
      - data/splits/fold_4_val.csv
    outs:
      - data/processed

  validate_dataset:
    cmd: python src/datasets/validate_dataset.py
    deps:
      - src/datasets
      - data/processed
    outs:
      - reports/dataset_validation_report.json
